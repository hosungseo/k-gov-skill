name: 새 행정업무 스킬 제안
description: 공무원 업무에서 반복되는 작업을 k-gov-skill로 제안합니다.
title: "[Skill] "
labels: [skill-request]
body:
  - type: textarea
    id: problem
    attributes:
      label: 어떤 업무 문제인가요?
      description: 반복되는 행정업무, 귀찮은 자료탐색, API/문서 처리 문제를 적어주세요.
      placeholder: 예) 관보에서 특정 부처의 직제 관련 고시를 매주 찾아야 합니다.
    validations:
      required: true
  - type: dropdown
    id: auth
    attributes:
      label: 사용자 신청/로그인이 필요한가요?
      options:
        - 불필요
        - 선택
        - 필요
        - 잘 모름
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: 공식 출처/API/문서
      placeholder: data.go.kr API, 법제처, 관보, 국회, HWP 양식 등
  - type: textarea
    id: output
    attributes:
      label: 원하는 산출물
      placeholder: 표, 검토의견 초안, Markdown, JSON, HWPX 등
