name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate skills and examples
        run: npm run check
      - name: Refresh skill catalog
        run: node scripts/list-skills.mjs > /tmp/skill-catalog.json
      - name: Ensure committed catalog is current
        run: diff -u examples/skill-catalog.json /tmp/skill-catalog.json
